<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Changelog</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #141420;
    --border: #252538;
    --text: #e0e0e0;
    --muted: #777;
    --accent: #6c63ff;
    --link: #74b9ff;
    --green: #2ed573;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    padding: 20px; max-width: 800px; margin: 0 auto;
    -webkit-font-smoothing: antialiased;
  }
  header { text-align: center; padding: 16px 0 20px; }
  header h1 { font-size: 1.3rem; font-weight: 600; }
  .back { color: var(--accent); text-decoration: none; font-size: 0.8rem; }
  .back:hover { text-decoration: underline; }

  .entry {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 12px;
  }
  .entry-date {
    color: var(--accent); font-size: 0.75rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px;
  }
  .entry h3 { font-size: 0.95rem; margin-bottom: 8px; color: var(--green); }
  .entry p { font-size: 0.85rem; line-height: 1.6; color: var(--text); margin-bottom: 6px; }
  .entry p strong { color: var(--accent); font-weight: 600; }
  .entry p code {
    background: rgba(108,99,255,.12); color: var(--link);
    padding: 1px 5px; border-radius: 3px; font-size: 0.8rem;
    font-family: "SF Mono", Consolas, monospace;
  }
  .entry p em { color: var(--muted); font-style: italic; }
  .entry .detail { color: var(--muted); font-size: 0.8rem; }
  .entry .files-changed {
    font-size: 0.78rem; color: var(--muted);
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .entry .files-changed strong { color: var(--muted); }
  .entry .verification {
    font-size: 0.75rem; color: var(--green);
    margin-top: 4px; opacity: .8;
  }
  .entry .verification strong { color: var(--green); }

  .empty { color: var(--muted); text-align: center; padding: 60px 0; font-size: .9rem; }
</style>
</head>
<body>
<header>
  <a href="/" class="back">← Вакансії</a>
  <h1>Changelog — Autonomous Improvements</h1>
</header>
<div id="app"><div class="empty">Завантаження...</div></div>

<script>
async function load() {
  try {
    const r = await fetch('/api/changelog');
    const data = await r.json();
    render(data.content);
  } catch(e) {
    document.getElementById('app').innerHTML = '<div class="empty">Помилка завантаження</div>';
  }
}

function render(md) {
  const entries = md.split(/^---$/m).filter(s => s.trim() && !s.includes('# Changelog'));
  if (!entries.length) {
    document.getElementById('app').innerHTML = '<div class="empty">Ще немає записів. Перший запис з\'явиться після нічного запуску о 3:00.</div>';
    return;
  }

  let html = '';
  for (const entry of entries.reverse()) {
    const lines = entry.trim().split('\n').filter(l => l.trim());
    let date = '', title = '', body = [];
    for (const line of lines) {
      if (line.startsWith('## ')) { date = line.replace('## ', ''); }
      else if (line.startsWith('### ')) { title = line.replace('### ', ''); }
      else { body.push(line); }
    }
    html += `<div class="entry">
      ${date ? `<div class="entry-date">${esc(date)}</div>` : ''}
      ${title ? `<h3>${esc(title)}</h3>` : ''}
      ${body.map(l => renderLine(l)).join('')}
    </div>`;
  }
  document.getElementById('app').innerHTML = html;
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderMd(s) {
  let t = esc(s);
  // **bold** -> <strong>bold</strong>
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // `code` -> <code>code</code>
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  // *italic* -> <em>italic</em> (but not inside already-processed tags)
  t = t.replace(/(?<!\w)\*([^*]+)\*(?!\w)/g, '<em>$1</em>');
  return t;
}

function renderLine(line) {
  const trimmed = line.trim();
  // Detect special sections for styling
  if (trimmed.startsWith('**Змінені файли:**') || trimmed.startsWith('**Files changed:**')) {
    return `<div class="files-changed">${renderMd(trimmed)}</div>`;
  }
  if (trimmed.startsWith('**Перевірка:**') || trimmed.startsWith('**Verification:**')) {
    return `<div class="verification">${renderMd(trimmed)}</div>`;
  }
  return `<p>${renderMd(trimmed)}</p>`;
}

load();
</script>
</body>
</html>
